name: "Cleanup PR Preview"

on:
  pull_request:
    types: [closed]

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        run: |
          PR_NUMBER=${{ github.event.number }}
          if [ -d "pr/${PR_NUMBER}" ]; then
            rm -rf "pr/${PR_NUMBER}"
            echo "Removed preview directory for PR #${PR_NUMBER}"
          else
            echo "Preview directory for PR #${PR_NUMBER} does not exist"
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove PR preview for #${{ github.event.number }}" || echo "No changes to commit"
          git push
